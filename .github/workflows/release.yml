name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository }}/invisible-api
  RELAY_IMAGE_NAME: ${{ github.repository }}/invisible-relay
  DATABASE_URL: postgres://invisible:password@localhost:5432/invisible_chat
  REDIS_URL: redis://localhost:6379/

jobs:
  test:
    name: Test Before Release
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invisible
          POSTGRES_PASSWORD: password
          POSTGRES_DB: invisible_chat
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace -- --test-threads=1

  build-and-push-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- API Service Image ---
      - name: Extract metadata (tags, labels) for api
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}

      - name: Build and push api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      # --- Relay Service Image ---
      - name: Extract metadata (tags, labels) for relay
        id: meta-relay
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.RELAY_IMAGE_NAME }}

      - name: Build and push relay image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.relay
          push: true
          tags: ${{ steps.meta-relay.outputs.tags }}
          labels: ${{ steps.meta-relay.outputs.labels }}

  create-release:
    name: Create GitHub Release and Upload Binaries
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build binaries
        run: cargo build --release --workspace

      - name: Prepare binaries for release
        run: |
          mkdir -p dist
          cp target/release/api dist/invisible-api-linux-amd64
          cp target/release/relay dist/invisible-relay-linux-amd64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: dist/*
          generate_release_notes: true
