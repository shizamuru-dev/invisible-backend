services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invisible
      POSTGRES_PASSWORD: password
      POSTGRES_DB: invisible_chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invisible -d invisible_chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/uploads || true;
      exit 0;
      "

  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    ports:
      - "3030:3030"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - RUST_LOG=debug
      - DATABASE_URL=postgres://invisible:password@127.0.0.1:5432/invisible_chat
      - REDIS_URL=redis://127.0.0.1:6379/

  auth:
    build:
      context: .
      dockerfile: Dockerfile.auth
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - RUST_LOG=debug
      - DATABASE_URL=postgres://invisible:password@127.0.0.1:5432/invisible_chat
      - REDIS_URL=redis://127.0.0.1:6379/
      - S3_ENDPOINT=http://127.0.0.1:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_REGION=us-east-1

volumes:
  minio_data:
  pgdata:
  redisdata:
