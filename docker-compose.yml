services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-invisible}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-invisible_chat}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invisible} -d ${POSTGRES_DB:-invisible_chat}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 $${S3_ACCESS_KEY:-minioadmin} $${S3_SECRET_KEY:-minioadmin};
      /usr/bin/mc mb myminio/$${S3_BUCKET:-uploads} || true;
      exit 0;
      "

  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    ports:
      - "${RELAY_PORT:-3030}:${RELAY_PORT:-3030}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - RUST_LOG=${RUST_LOG:-debug}
      - DATABASE_URL=${DATABASE_URL:-postgres://invisible:password@postgres:5432/invisible_chat}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/}
      - JWT_SECRET=${JWT_SECRET:-docker-dev-secret-change-in-production}
      - RELAY_PORT=${RELAY_PORT:-3030}

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - RUST_LOG=${RUST_LOG:-debug}
      - DATABASE_URL=${DATABASE_URL:-postgres://invisible:password@postgres:5432/invisible_chat}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/}
      - JWT_SECRET=${JWT_SECRET:-docker-dev-secret-change-in-production}
      - API_PORT=${API_PORT:-3001}
      - API_URL=${API_URL:-http://localhost:3001}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-uploads}

volumes:
  minio_data:
  pgdata:
  redisdata:
